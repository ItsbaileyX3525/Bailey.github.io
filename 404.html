<script>
  const lowercasePaths = [
    '/home',
    '/code',
    '/portfolio',
    '/sunsnake',
    '/download',
    '/encryption',
    '/games/amogusclicker',
    '/games/platformer'
  ];

  const uppercasePaths = [
    '/Home',
    '/Code',
    '/Portfolio',
    '/Sunsnake',
    '/Download',
    '/Encryption',
    '/Games/AmogusClicker',
    '/Games/Platformer'
  ];

  const currentPage = window.location.pathname.toLowerCase();

  const index = lowercasePaths.indexOf(currentPage);

  if (index !== -1) {
    const redirectPath = uppercasePaths[index];
    window.location.replace(redirectPath);
  }
</script>
