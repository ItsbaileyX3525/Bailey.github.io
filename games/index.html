<!DOCTYPE HTML>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
<meta property="og:title" content="Welcome to my site!!! Have a great time!">
<meta property="og:description" content="Website by bailey Miles.">
<link rel="stylesheet" href="../assets/sswg.css">
<link rel="stylesheet" href="../assets/style.css">
<link rel="stylesheet" href="../assets/button.css">
<link rel="stylesheet" href="../assets/slider.css">
<link rel="stylesheet" href="../assets/sus.css">
<link rel="shortcut icon" type="image/png" href="../assets/icon.png">
</head>
<body style="background-color: rgb(67, 65, 65);">
<left>
<title>Home page</title>

<div class="menu-bar">
  <button id="menu-button">
    <img src="../assets/56763.png" alt="Menu icon" width="48" height="48">
  </button>
  <div class="menu-items">
    <button id="home-button">Home</button>
    <button id="code-button">Code</button>
    <button id="portfolio-button">Portfolio</button>
    <label class="switch">
      <input type="checkbox" id="bg-switch">
      <span class="slider round"></span>
    </label>
    <img id="creamyballs" class="small-img" src="../assets/dark.png">
  </div>
</div>
<style>
  .menu-bar {
position: fixed;
top: 0;
left: 0;
width: 100%;
background-color: #333;
color: #fff;
padding: 10px;
box-sizing: border-box;
}

#menu-button {
display: none;
background-color: transparent;
}

.menu-items {
display: flex;
justify-content: space-between;
align-items: center;
}

.menu-items button {
background-color: transparent;
border: none;
color: #fff;
font-size: 16px;
cursor: pointer;
}

@media screen and (max-width: 768px) {
#menu-button {
  display: block;
}
.menu-items {
display: flex;
justify-content: flex-end;
align-items: center;
height: 0;
overflow: hidden;
transition: height 0.3s ease-in-out;
}
.menu-items button {
  margin-bottom: 10px;
}
.menu-items.show {
height: 50px;
}
.menu-items button:active {
  animation: click-animation 0.2s linear;
}

@keyframes click-animation {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(0.9);
  }
  100% {
    transform: scale(1);
  }
}
}
</style>
<script>
const menuButton = document.getElementById('menu-button');
const menuItems = document.querySelector('.menu-items');
const homeButton = document.getElementById('home-button');
const codeButton = document.getElementById('code-button');
const portfolioButton = document.getElementById('portfolio-button');

menuButton.addEventListener('click', () => {
menuItems.classList.toggle('show');
});

codeButton.addEventListener('click', () => {
window.location.href = '../Code';
});

portfolioButton.addEventListener('click', () => {
window.location.href = '../Portfolio';
});

homeButton.addEventListener('click', () => {
    window.location.href = '../Home';
});

window.addEventListener('resize', () => {
if (window.innerWidth > 768) {
  menuItems.classList.remove('show');
}
});
</script><br><br><br>
<div style="text-align: left;">
<div style="font-size: 20px;">
  <label class="switch">
    <input type="checkbox" id="bg-switch">
  </label>
  <script>
    const body = document.body;
    const toggleSwitch = document.querySelector('#bg-switch');
    const playButton = document.querySelector('#creamyballs');
    
    function toggleDarkMode() {
      body.style.backgroundColor = toggleSwitch.checked ? '#000' : '#fff';
      playButton.src = toggleSwitch.checked ? '../assets/dark.png' : '../assets/light.png';
      body.classList.toggle('dark-text', toggleSwitch.checked);
      body.classList.toggle('light-text', !toggleSwitch.checked);
      localStorage.setItem('dark-mode', toggleSwitch.checked);
    }
    
    toggleSwitch.checked = localStorage.getItem('dark-mode') === 'true';
    toggleDarkMode();
    
    toggleSwitch.addEventListener('click', toggleDarkMode);
    </script>
    <style>
    body.dark-text {
      color: #fff;
    }
    
    body.light-text {
      color: #000;
    }
    </style>
    
<br>
<div style="align-items: center">
<a href="../games/Game"><button>Platformer</button></a>
</div>



<style>
  button {
    background-color: #0d014f;
    border: none; 
    color: rgb(255, 255, 255);
    padding: 12px 24px; 
    text-align: center; 
    display: inline-block; 
    font-size: 14px; 
    border-radius: 4px; 
    box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.3); 
    transition: all 0.3s ease; 
    cursor: pointer;
    overflow: hidden;
  }
  button a {
    display: block;
    width: 100%;
    height: 100%;
    text-decoration: none;
  }
  button:hover {
    background-color: #000000; 
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3); 
    transform: translateY(-2px);
  }
  button span {
    pointer-events: none;
  }
  </style>
</body>
</html>
