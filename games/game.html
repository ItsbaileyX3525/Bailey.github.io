<!DOCTYPE html>
<html><title>Game1</title><body>
<script src="taptapirs/taptapir.js"></script>
<script type="text/sunsnake">
    set_orientation('horizontal')
    ASSETS_FOLDER = 'Game1assets/'
    set_window_color('rgb(50 50 50)')
    set_background_color('rgb(9 9 1)')
    set_scale(0.95)
    set_fullscreen(True)
    movingRight=False
    movingLeft=False
    speed=.01
    player=Entity(texture='happyboi.jpg',scale=.1)
    def input(key):
        if key=='d':
            movingRight=True
        if key=='d up':
            movingRight=False
        if key=='a':
            movingLeft=True
        if key=='a up':
            movingLeft=False
    def update():
        if movingRight:
            player.x+=speed
        if movingLeft:
            player.x-=speed
    


</script><script src="taptapirs/sunsnake_compiler.js"></script></html>
