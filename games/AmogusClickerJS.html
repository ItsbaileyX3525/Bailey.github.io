
<!DOCTYPE html>
<html>
<head>
  <title>Amogus clicker</title>
  <link rel="shortcut icon" type="image/png" href="AmogusClickerAssets/Red.png">
</head>
<body>
<script>
  susClick = new Audio("AmogusClickerAssets/sus.mp3")
  music = new Audio("AmogusClickerAssets/bg music.mp3")
  music.loop = true
  susLevelUp = new Audio("AmogusClickerAssets/sus1.mp3")

</script>
  

<script src="taptapir/taptapir.js"></script>
<script type="text/javascript">
False=false
True=true
var Game = {
    Earn: function(number) {
      susScore+=number;
    }
  }
  

ASSETS_FOLDER = 'AmogusClickerAssets/'
set_orientation('horizontal')
set_background_color('rgb(40,40,40)')
set_window_color('rgb(24,24,24)')
background = new Entity({texture:'bg.gif', scale:[1.8,1.005], z:10})
settingsBackgroud = new Entity({enabled:False,texture:'NootNoot.gif', scale:[1.8,1.005], z:10})
startGame = new Button({scale:3.1,text:'Click to start game!',text_color:color.white,color:color.black,z:-9})
startGame.on_click = function() {
    if (localStorage.getItem("MusicMuted") === "true") {
        music.pause();
        music.currentTime = 0;
    }
    else {
        music.play()
    }
    startGame.enabled=False
    set_fullscreen(True)
}
muteMusic = new Button({x:-.6,y:.2,enabled:False,scale:.15,texture:'SpeakerMute.png'})
muteMusic.on_click = function() {
    if (muteMusic.texture === 'Speaker.png') {
        music.pause();
        muteMusic.texture = 'SpeakerMute.png'
        localStorage.setItem("MusicMuted", true)
    }
    else {
        music.play()
        muteMusic.texture = 'Speaker.png'
        localStorage.setItem("MusicMuted", false)  
    }
}
if (localStorage.getItem("MusicMuted") === "true") {
    muteMusic.texture = 'SpeakerMute.png'
}
else {
    muteMusic.texture = 'Speaker.png'
}
muteClick = new Button({x:-.6,y:-.2,enabled:False,scale:.15,texture:'SpeakerMute.png'})
muteClick.on_click = function() {
    if (muteClick.texture === 'Speaker.png') {
        susClick.volume = 0;
        muteClick.texture = 'SpeakerMute.png'
        localStorage.setItem("ClickerMuted", true)
    }
    else {
        susClick.volume = 1;
        muteClick.texture = 'Speaker.png' 
        localStorage.setItem("ClickerMuted", false) 
    }
}
if (localStorage.getItem("ClickerMuted") === "true") {
    muteClick.texture = 'SpeakerMute.png'
    susClick.volume = 0;
}
else {
    muteClick.texture = 'Speaker.png'
}
muteMusicText = new Text({enabled:False,text_color:color.white,text:'Mute music',y:-.2725,x:-.1})
muteClickText = new Text({enabled:False,text_color:color.white,text:'Mute click sounds',y:-.665,x:-.1})
settingsButton = new Button({enabled:True,scale:.1,texture:"Settings.png",x:.7,y:.4})
settingsButton.on_click = function() {
    if (muteMusic.enabled) {
        muteMusic.enabled = False
        e.enabled = False
        muteClick.enabled = False
        background.enabled = True
        settingsBackgroud.enabled = False
        muteClickText.enabled = False
        muteMusicText.enabled = False
        shopButton.enabled = True
        susClicker.enabled = True
        susScoreText.enabled = True
    }
    else {
        muteMusic.enabled = True
        e.enabled = True
        muteClick.enabled = True
        settingsBackgroud.enabled = True
        background.enabled = False
        muteClickText.enabled = True
        muteMusicText.enabled = True
        shopButton.enabled = False
        susClicker.enabled = False
        susScoreText.enabled = False
    }
}
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = 'audio/*';
fileInput.style.borderRadius = '10px';
fileInput.style.opacity = 0;
fileInput.addEventListener('change', function() {    const file = fileInput.files[0]; {
    const fileURL = URL.createObjectURL(file);
    music.src = fileURL;
    music.play();
    localStorage.setItem('audioFile', fileURL);
}
});
const storedFileURL = localStorage.getItem('audioFile');
if (storedFileURL) {
    music.src = storedFileURL;
    music.play();
}
e = new Button({enabled:False,scale_y:.1,scale_x:.3,y:.4,x:0,text:'Change music'})
e.el.appendChild(fileInput)
e.fit_to_text()
susScore = localStorage.getItem("SusScore")
susScoreMultiplier = localStorage.getItem("SusScoreMultiplier")
susScoreMultiplierCost = localStorage.getItem("SusScoreMultiplierCost")
multiplier = localStorage.getItem("SusMultiplier")
multiplierCost = localStorage.getItem("SusMultiplierCost")
susGreens = localStorage.getItem("SusGreens")
susGreenCost = localStorage.getItem("SusGreenCost")
susPinkCost = localStorage.getItem("SusPinkCost")
susPinks = localStorage.getItem("SusPinks")
stopGen = False
canClick = True
if (localStorage.getItem("MusicMuted") === null) {
    musicMuted = false
    localStorage.setItem("MusicMuted", musicMuted)
}
if (localStorage.getItem("ClickMuted") === null) {
    clickMuted = false
    localStorage.setItem("ClickMuted", clickMuted)
}
if (susScore === null) {
    susScore = 0
    localStorage.setItem("SusScore", susScore)
}
if (susScoreMultiplier === null || susScoreMultiplier === 0) {
    susScoreMultiplier = 1
    localStorage.setItem("SusScoreMultiplier", susScoreMultiplier)
}
if (susScoreMultiplierCost === null || susScoreMultiplierCost === 0) {
    susScoreMultiplierCost = 50
    localStorage.setItem("SusScoreMultiplierCost", susScoreMultiplierCost)
}
if (multiplier === null || multiplier === 0) {
    multiplier = 1
    localStorage.setItem("SusMultiplier", multiplier)
}
if (multiplierCost === null || multiplierCost === 0) {
    multiplierCost = 15000
    localStorage.setItem("SusMultiplierCost", multiplierCost)
}
if (susGreens === null) {
    susGreens = 0
    localStorage.setItem("SusGreens", susGreens)
}
if (susGreenCost === null || susGreenCost === 0) {
    susGreenCost = 100
    localStorage.setItem("SusGreenCost", susGreenCost)
}
if (susPinks === null) {
    susPinks = 0
    localStorage.setItem("SusPinks", susPinks)
}
if (susPinkCost === null || susPinkCost === 0) {
    susPinkCost = 250
    localStorage.setItem("SusPinkCost", susPinkCost)
}
susScore = parseInt(susScore, 10)
susScoreMultiplier = parseInt(susScoreMultiplier, 10)
susScoreMultiplierCost = parseInt(susScoreMultiplierCost, 10)
multiplier = parseInt(multiplier, 10)
multiplierCost = parseInt(multiplierCost, 10)
susGreens = parseInt(susGreens, 10)
susGreenCost = parseInt(susGreenCost, 10)
susPinks = parseInt(susPinks, 10)
susPinkCost = parseInt(susPinkCost, 10)
susClicker = new Button({scale:.2,x:-.4,color:color.clear,texture:'Red.png'})
susClicker.on_click = function() {
    if (canClick) {
        susScore += 1 * susScoreMultiplier
        susClicker.scale = [.23,.23].map(e => e*1.25)
        susClicker.animate('scale_x', .2, duration=.1)
        susClicker.animate('scale_y', .2, duration=.1)
        susClick.pause()
        susClick.currentTime = 0
        susClick.play()
        canClick = False
        after(.06, function() {
            canClick = True
        })
    }
    else {
        ;
    }
}
shopButton = new Button({enabled:True,scale:.2,x:.6,texture:'Shop.png'})
shopButton.on_click = function() {
    if (! susClicker.enabled) {
        susClicker.enabled = True
        settingsButton.enabled = True
        susPrestige.enabled = False
        susGreen.enabled = False
        susPink.enabled = False
        susClickerPowerup.enabled = False
    }
    else {
        susClicker.enabled = False
        settingsButton.enabled = False
        susPrestige.enabled = True
        susGreen.enabled = True
        susPink.enabled = True
        susClickerPowerup.enabled = True
        if (muteMusic.enabled) {
            muteMusic.enabled = False
            settingsButton.enabled = True
        }
    }
}
susPrestige = new Button({enabled:False,scale_x:.39,scale_y:.2,texture:'Prestige.png',x:-.6,y:-.2})
susPrestige.on_click = function() {
    if (susScore >= multiplierCost) {
        susScore = 0
        multiplier += 1
        stopGen = True
        multiplierCost += Math.round(multiplierCost * 1.3)
        susPinks = 0
        susGreens = 0
        susGreenCost = 100
        susPinkCost = 250
        susScoreMultiplier = 1
        susScoreMultiplierCost = 50
        after(1.1, function() {
            stopGen = False
        })
    }
}
susGreen = new Button({enabled:False,scale_x:.14,scale_y:.15, x:-.6,y:.3,color:color.clear,texture:'Lime.png'})
susGreen.on_click = function() {
    if (susScore >= susGreenCost && ! stopGen) {
        if (susGreens === 0) {
            susGreenFunc()
        }
        susScore -= susGreenCost
        susGreens += 1
        susGreenCost = Math.round(susGreenCost * 1.15)
    }
}
function susGreenFunc() {
    susScore += 5 * susGreens * multiplier
    after(1, function() {
        if (! stopGen) {
            susGreenFunc()
        }
    })
}
susPink = new Button({enabled:False,scale_x:.15,scale_y:.13, x:-.6,y:.1,color:color.clear,texture:'Pink.png'})
susPink.on_click = function() {
    if (susScore >= susPinkCost && ! stopGen) {
        if (susPinks === 0) {
            susPinkFunc()
        }
        susScore -= susPinkCost
        susPinks += 1
        susPinkCost = Math.round(susPinkCost * 1.15)
    }
}
function susPinkFunc() {
    susScore += 10 * susPinks * multiplier
    after(1, function() {
        if (! stopGen) {
            susPinkFunc()
        }
    })
}
susClickerPowerup = new Button({enabled:False,x:.3,scale_y:.15,scale_x:.255,text:'Click levelup.',})
susClickerPowerup.on_click = function() {
    if (susScore>=susScoreMultiplierCost) {
        susScore -= susScoreMultiplierCost
        susScoreMultiplier += 1
        susScoreMultiplierCost = Math.round(susScoreMultiplierCost*1.75)
        susLevelUp.play()
    }
}
susClickerPowerup.fit_to_text()
susScoreText = new Button({enabled:True,color:color.gray,text_color:color.black,text:`Suses: ${susScore}`,x:0,y:.4})
susScoreText.fit_to_text()
function saveGame() {
    localStorage.setItem("SusScore", susScore)
    localStorage.setItem("SusMultiplier", multiplier)
    localStorage.setItem("SusMultiplierCost", multiplierCost)
    localStorage.setItem("SusGreens", susGreens)
    localStorage.setItem("SusGreenCost", susGreenCost)
    localStorage.setItem("SusPinkCost", susPinkCost)
    localStorage.setItem("SusPinks", susPinks)
    localStorage.setItem("SusScoreMultiplier", susScoreMultiplier)
    localStorage.setItem("SusScoreMultiplierCost", susScoreMultiplierCost)
    after(1, function() {
        saveGame()
    })
}
saveGame()
function update() {
    susScoreText.text = `Suses: ${susScore}`
    susScoreText.fit_to_text()
}
if (susGreens > 0) {
    susGreenFunc()
}
if (susPinks > 0) {
    susPinkFunc()
}
</script>
</body>
</html>
