<!DOCTYPE html>

  <title>Amogus clicker</title>
</head>
<body>
  <img id="play-button" class="small-img" src="https://i.imgur.com/GfBVNac.png" alt="play-button">
  <audio id="my-audio" src="AmogusClickerAssets/bg music.mp3"></audio>
  <script>
    var playButton = document.getElementById("play-button");
    var audio = document.getElementById("my-audio");
    var isPlaying = false;
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function (event) {
    if (event.keyCode == 123) { // F12 key
        return false;}}
    document.addEventListener('keydown', function(event) {
    if (event.shiftKey) {
        return false;}});
    playButton.addEventListener("click", function() {
      if (!isPlaying) {
        playButton.src = "https://i.imgur.com/xpmo1c4.png";
        audio.play();
      } else {
        playButton.src = "https://i.imgur.com/GfBVNac.png";
        audio.pause();
      }
      isPlaying = !isPlaying;
    });
  </script>
  
  
<script src="taptapir/taptapir.js"></script>
