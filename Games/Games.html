<body>
<style>
.ButtonContainer {
height: 50px;
position: relative;
}

.ButtonCenter {
margin: 0;
position: absolute;
top: 50%;
left: 50%;
-ms-transform: translate(-50%, -50%);
transform: translate(-50%, -50%);
}
.button-container {
display: grid;
grid-template-rows: 1fr 1fr 1fr;
grid-template-columns: 1fr 1fr;
grid-gap: 5px;
width: 90%;
margin: 0 auto;
}

.button-container button {
background-color: #333;
font-size: 20px;
color: white;
padding: 10%;
width: 100%;
border-radius: 10px;
border: none;
cursor: pointer;
background-size: 100%;
background-position: center;
background-repeat: no-repeat;
}

.button-container button:hover {
background-color: #222;
transform: scale(1.2);
transition: transform 0.5s ease-in-out;
}

.button-container button p {
color: gray;
font-size: 14px;
margin-left: 60px;
margin-top: -10px;
}
#container {
display: flex;
}

.column {
flex: 1;
text-align: center;
}

.button {
background-color: transparent;
background-image: url('default-background.jpg');
background-repeat: no-repeat;
background-size: cover;
width: 200px;
height: 100px;
border: none;
position: relative;
overflow: hidden;
margin: 5px;
border-radius: 2.8em;
color: whitesmoke;
}
</style>
    <h1 id="header" style="text-align: center; margin-top: 80px;">Games Sector</h1>

      <a href="../Games/AmogusClicker/AmogusClicker"><button class="button" style="background-image: url('../assets/previews/preview1.png'); cursor: pointer;"></button></a>

    </div>
    <div class="column">
      <a href="../Games/MomsSpaghetti/MomsSpaghetti"><button class="button" style="background-image: url('../assets/previews/preview4.png'); cursor: pointer;"></button></a>
      <a href=""><button class="button" style="background-image: url('../assets/previews/preview5.png'); cursor: pointer;"></button></a>
      <a href=""><button class="button" style="background-image: url('../assets/previews/preview5.png'); cursor: pointer;"></button></a>
    </div>
  </div>

  <script>
// Add event listeners to buttons
var buttons = document.getElementsByClassName("button");

for (var i = 0; i < buttons.length; i++) {
  buttons[i].addEventListener("mouseover", function() {
    var buttonIndex = Array.from(buttons).indexOf(this);
    document.body.style.backgroundImage = "url('../assets/previews/preview" + (buttonIndex + 1) + ".png')";
    document.body.style.backgroundRepeat = "no-repeat"
    document.body.style.backgroundSize = "cover"
    console.log("url('preview" + (buttonIndex + 1) + ".png')")
  });

  buttons[i].addEventListener("mouseout", function() {
    document.body.style.backgroundImage = "none";
  });
}

  </script>
