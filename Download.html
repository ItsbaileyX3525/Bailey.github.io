<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Application Download Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    
    h1 {
      color: #00ff37;
    }
    
    .container {
      margin-top: 100px;
    }
    
    .btn {
      display: inline-block;
      padding: 10px 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      background-color: #0b0fda;
      color: #fff;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    
    .btn:hover {
      background-color: #082ed4;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome to the Application Download Page</h1>
    <p>Click the button below to download the application.</p>
    <a href="#" class="btn" id="downloadBtn">Download Now</a>
  </div>

  <script>
    document.getElementById('downloadBtn').addEventListener('click', function () {
      // Change the URL below to the desired page you want to open
      window.location.href = '../SusClicker.apk';
    });
  </script>
</body>

</html>
