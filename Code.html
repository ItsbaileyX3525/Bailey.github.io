<script>

<div style="font-size: 20px;">
  <label class="switch">
    <input type="checkbox" id="bg-switch">
  </label>
  <script>
    const body = document.body;
    const toggleSwitch = document.querySelector('#bg-switch');
    const playButton = document.querySelector('#creamyballs');
    
    function toggleDarkMode() {
      body.style.backgroundColor = toggleSwitch.checked ? '#000' : '#fff';
      playButton.src = toggleSwitch.checked ? 'assets/dark.png' : 'assets/light.png';
      body.classList.toggle('dark-text', toggleSwitch.checked);
      body.classList.toggle('light-text', !toggleSwitch.checked);
      localStorage.setItem('dark-mode', toggleSwitch.checked);
    }
    
    toggleSwitch.checked = localStorage.getItem('dark-mode') === 'true';
    toggleDarkMode();
    
    toggleSwitch.addEventListener('click', toggleDarkMode);
    </script>
    <style>
    body.dark-text {
      color: #fff;
    }
    
    body.light-text {
      color: #000;
