<style>
  .menu-bar {
position: fixed;
top: 0;
left: 0;
width: 100%;
background-color: #333;
color: #fff;
padding: 10px;
box-sizing: border-box;
}

#menu-button {
display: none;
background-color: transparent;
}

.menu-items {
display: flex;
justify-content: space-between;
align-items: center;
}

.menu-items button {
background-color: transparent;
border: none;
color: #fff;
font-size: 16px;
cursor: pointer;
}

@media screen and (max-width: 768px) {
#menu-button {
  display: block;
}
.menu-items {
display: flex;
justify-content: flex-end;
align-items: center;
height: 0;
overflow: hidden;
transition: height 0.3s ease-in-out;
}
.menu-items button {
  margin-bottom: 10px;
}
.menu-items.show {
height: 50px;
}
.menu-items button:active {
  animation: click-animation 0.2s linear;
}

@keyframes click-animation {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(0.9);
  }
  100% {
    transform: scale(1);
  }
}
}
</style>
<script>
const menuButton = document.getElementById('menu-button');
const menuItems = document.querySelector('.menu-items');
const homeButton = document.getElementById('home-button');
const portfolioButton = document.getElementById('portfolio-button');
const refreshButton = document.getElementById('refresh-button');

menuButton.addEventListener('click', () => {
menuItems.classList.toggle('show');
});

homeButton.addEventListener('click', () => {
window.location.href = '/Home';
});

portfolioButton.addEventListener('click', () => {
window.location.href = '/Portfolio';
});

refreshButton.addEventListener('click', () => {
window.location.reload();
});

window.addEventListener('resize', () => {
if (window.innerWidth > 768) {
  menuItems.classList.remove('show');
}
});
</script><br><br><br>
<div style="text-align: left;">
<div style="font-size: 20px;">
  <label class="switch">
    <input type="checkbox" id="bg-switch">
  </label>
  <script>
    const body = document.body;
    const toggleSwitch = document.querySelector('#bg-switch');
    const playButton = document.querySelector('#creamyballs');
    
    function toggleDarkMode() {
      body.style.backgroundColor = toggleSwitch.checked ? '#000' : '#fff';
      playButton.src = toggleSwitch.checked ? 'assets/dark.png' : 'assets/light.png';
      body.classList.toggle('dark-text', toggleSwitch.checked);
      body.classList.toggle('light-text', !toggleSwitch.checked);
      localStorage.setItem('dark-mode', toggleSwitch.checked);
    }
    
    toggleSwitch.checked = localStorage.getItem('dark-mode') === 'true';
    toggleDarkMode();
    
    toggleSwitch.addEventListener('click', toggleDarkMode);
    </script>
    <style>
    body.dark-text {
      color: #fff;
    }
    
    body.light-text {
      color: #000;
    }
