<!DOCTYPE html>
<html>
    
  <head>
    <title>Tic Tac Toe Game</title>
  </head>
  
  <body>
    <table id="gameboard">
      <tr>
        <td id="0"></td>
        <td id="1"></td>
        <td id="2"></td>
      </tr>
      <tr>
        <td id="3"></td>
        <td id="4"></td>
        <td id="5"></td>
      </tr>
      <tr>
        <td id="6"></td>
        <td id="7"></td>
        <td id="8"></td>
      </tr>
    </table>
    <br>
    <button onclick="reset()">Reset Game</button>

    <script>
      let board = ['', '', '', '', '', '', '', '', ''];
      let turn = 'X';
      let gameOver = false;

      function reset() {
        board = ['', '', '', '', '', '', '', '', ''];
        turn = 'X';
        gameOver = false;
        clearBoard();
      }

      function clearBoard() {
        let cells = document.getElementsByTagName('td');
        for (let i = 0; i < cells.length; i++) {
          cells[i].innerHTML = '';
        }
      }

      function play(id) {
        if (gameOver) {
          return;
        }

        let cell = document.getElementById(id);
        if (cell.innerHTML === '') {
          cell.innerHTML = turn;
          board[id] = turn;

          if (checkWinner()) {
            gameOver = true;
            alert('Player ' + turn + ' wins!');
          } else if (checkDraw()) {
            gameOver = true;
            alert('Draw!');
          } else {
            turn = turn === 'X' ? 'O' : 'X';
          }
        }
      }

      function checkWinner() {
        // Check rows
        for (let i = 0; i < 9; i += 3) {
          if (board[i] !== '' && board[i] === board[i+1] && board[i] === board[i+2]) {
            return true;
          }
        }

        // Check columns
        for (let i = 0; i < 3; i++) {
          if (board[i] !== '' && board[i] === board[i+3] && board[i] === board[i+6]) {
            return true;
          }
        }

        // Check diagonals
        if (board[0] !== '' && board[0] === board[4] && board[0] === board[8]) {
          return true;
        }

        if (board[2] !== '' && board[2] === board[4] && board[2] === board[6]) {
          return true;
        }

        return false;
      }

      function checkDraw() {
        for (let i = 0; i < board.length; i++) {
          if (board[i] === '') {
            return false;
          }
        }
        return true;
      }

      let cells = document.getElementsByTagName('td');
      for (let i = 0; i < cells.length; i++) {
        cells[i].addEventListener('click', function() {
          play(i);
        });
      }
    </script>
  </body>
</html>
