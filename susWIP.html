  <img id="play-button" class="small-img" src="speaker-cross.png" alt="play-button">
  <audio id="my-audio" src="bg music.mp3"></audio>
  
  <script>
    var playButton = document.getElementById("play-button");
    var audio = document.getElementById("my-audio");
    var isPlaying = false;
  
    playButton.addEventListener("click", function() {
      if (!isPlaying) {
        playButton.src = "speaker.png";
        audio.play();
      } else {
        playButton.src = "speaker-cross.png";
        audio.pause();
      }
      isPlaying = !isPlaying;
    });
  </script>
