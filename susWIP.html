<!DOCTYPE html>
<html>
<head>
  <title>title</title>
  <link rel="stylesheet" type="text/css" href="sus.css">
</head>
<body>
  <img id="play-button" class="small-img" src="speaker-cross.png" alt="play-button">
  <audio id="my-audio" src="bg music.mp3"></audio>
  
  <script>
    var playButton = document.getElementById("play-button");
    var audio = document.getElementById("my-audio");
    var isPlaying = false;
  
    playButton.addEventListener("click", function() {
      if (!isPlaying) {
        playButton.src = "speaker.png";
        audio.play();
      } else {
        playButton.src = "speaker-cross.png";
        audio.pause();
      }
      isPlaying = !isPlaying;
    });
  </script>
  
  
  <script src="taptapir.js"></script>
  <script type="text/sunsnake">
    set_background_color('#fff')
    set_window_color('#fff')
    set_scale(2)
    bg = Entity(texture='bg.gif',scale_x=1)
    floatingsus = Entity(texture='Red.png',scale=.05,y=-.2)
    text = Text(text='Suses:', text_origin=[0,0], scale=1, y=.4, text_size=4, value=0)
    bgButton = Entity(texture='Red.png', scale=.3)
    b = Button(text='Click me!', color=hsv(160,1,.6), scale=[.2,.2], text_color=color.white, alpha=0)
    b.on_click = def():
        text.value += 1
        text.text = `Suses: ${text.value}`
        bgButton.scale = [e*1.25 for e in [.2,.2]]
        bgButton.animate('scale_x', .2, duration=.1)
        bgButton.animate('scale_y', .2, duration=.1)
  </script>
  <script src="sunsnake_compiler.js"></script>
  
</body>
</html>
