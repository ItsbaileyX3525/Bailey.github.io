  <script>
    // define the function to add the toggle switch and event listener
    function addToggleSwitch() {
      // select the switch
      var playButton = document.getElementById("creamyballs");
      const toggleSwitch = document.querySelector('input#bg-switch');
      
      toggleSwitch.checked = false;
      const body = document.querySelector('body');
      body.style.backgroundColor = 'white';
      playButton.src = "light.png";
      // add a click event listener to the switch
      toggleSwitch.addEventListener('click', function() {
  
        // toggle the background color of the body
        if (this.checked) {
          body.style.backgroundColor = 'rgb(67, 65, 65)';
          playButton.src = "dark.png";
          body.classList.add('dark-mode');
          body.classList.remove('light-mode');
        } else {
          body.style.backgroundColor = 'white';
          playButton.src = "light.png";
          body.classList.add('light-mode');
          body.classList.remove('dark-mode');
        }
  
        // toggle the text color of the body
        if (body.classList.contains('dark-mode')) {
          body.classList.add('dark-text');
          body.classList.remove('light-text');
        } else {
          body.classList.add('light-text');
          body.classList.remove('dark-text');
        }
      });
    }
  
    // call the function as soon as possible
    addToggleSwitch();
  </script>
